<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Electron Configuration Calculator</title>
    <meta name="description"
        content="Interactive Electron Configuration Calculator for all 118 elements. View full and abbreviated electron configurations instantly.">
    <link rel="preconnect" href="https://fonts.googleapis.com/">
    <link rel="preconnect" href="https://fonts.gstatic.com/" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="assests/style.css">
    <link rel="icon" type="image/x-icon" href="assests/imgs/c.png">
</head>

<body>

    <main class="app-main">

        <!-- Search -->
        <div class="search-wrapper">
            <div class="search-box">
                <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="11" cy="11" r="8" />
                    <path d="m21 21-4.35-4.35" />
                </svg>
                <input type="text" id="searchInput" placeholder="Search by name, symbol, or number..."
                    autocomplete="off">
                <span class="search-count" id="searchCount"></span>
            </div>
        </div>

        <!-- Result Card -->
        <section class="result-card" id="resultCard">
            <div class="result-placeholder" id="resultPlaceholder">
                <span class="placeholder-icon">🔬</span>
                <p>Select an element to view its electron configuration</p>
            </div>
            <div class="result-content" id="resultContent" style="display:none;">
                <div class="result-header">
                    <div class="element-badge" id="elementBadge">
                        <span class="badge-symbol" id="badgeSymbol"></span>
                        <span class="badge-number" id="badgeNumber"></span>
                    </div>
                    <div class="element-info">
                        <h2 id="elementName"></h2>
                        <span class="element-category" id="elementCategory"></span>
                    </div>
                </div>
                <div class="config-section">
                    <div class="config-block">
                        <label>Full Electron Configuration</label>
                        <div class="config-value" id="fullConfig"></div>
                    </div>
                    <div class="config-block">
                        <label>Abbreviated Configuration</label>
                        <div class="config-value abbreviated" id="abbrConfig"></div>
                    </div>
                </div>
            </div>
        </section>

        <!-- Periodic Table -->
        <section class="elements-section">
            <div class="section-header">
                <h2>Periodic Table of Elements</h2>
                <div class="legend">
                    <span class="legend-item" data-cat="nonmetal"><i></i>Nonmetal</span>
                    <span class="legend-item" data-cat="noble-gas"><i></i>Noble Gas</span>
                    <span class="legend-item" data-cat="alkali-metal"><i></i>Alkali Metal</span>
                    <span class="legend-item" data-cat="alkaline-earth"><i></i>Alkaline Earth</span>
                    <span class="legend-item" data-cat="metalloid"><i></i>Metalloid</span>
                    <span class="legend-item" data-cat="halogen"><i></i>Halogen</span>
                    <span class="legend-item" data-cat="transition-metal"><i></i>Transition Metal</span>
                    <span class="legend-item" data-cat="post-transition"><i></i>Post-Transition</span>
                    <span class="legend-item" data-cat="lanthanide"><i></i>Lanthanide</span>
                    <span class="legend-item" data-cat="actinide"><i></i>Actinide</span>
                </div>
            </div>
            <div class="table-scroll-wrapper">
                <div class="periodic-table" id="elementsGrid">
                    <!-- Generated by JS -->
                </div>
            </div>
        </section>

    </main>

    <!-- Footer -->
    <footer class="app-footer">
        <p>Chemistry Lecture Project — BAU University (Polytechnic)</p>
        <p class="author">By Mosa Akrm</p>
    </footer>

    <script src="index.js"></script>
</body>

</html>
